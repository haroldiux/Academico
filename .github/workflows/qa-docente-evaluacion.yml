name: qa-docente-evaluacion

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:fixtures

  unit:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  api:
    runs-on: ubuntu-latest
    needs: unit
    env:
      API_BASE_URL: ${{ secrets.API_BASE_URL }}
      API_DOCENTE_USERNAME: ${{ secrets.API_DOCENTE_USERNAME }}
      API_DOCENTE_PASSWORD: ${{ secrets.API_DOCENTE_PASSWORD }}
      API_DOCENTE_ASIGNATURA_ID: ${{ secrets.API_DOCENTE_ASIGNATURA_ID }}
      API_DOCENTE_GRUPO: ${{ secrets.API_DOCENTE_GRUPO }}
      API_DOCENTE_PARCIAL: ${{ secrets.API_DOCENTE_PARCIAL }}
      API_DOCENTE_SEDE_ID: ${{ secrets.API_DOCENTE_SEDE_ID }}
      API_DOCENTE_DOCENTE_ID: ${{ secrets.API_DOCENTE_DOCENTE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:api

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: api
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_DOCENTE_USERNAME: ${{ secrets.E2E_DOCENTE_USERNAME }}
      E2E_DOCENTE_PASSWORD: ${{ secrets.E2E_DOCENTE_PASSWORD }}
      E2E_DOCENTE_ASIGNATURA: ${{ secrets.E2E_DOCENTE_ASIGNATURA }}
      E2E_DOCENTE_GRUPO: ${{ secrets.E2E_DOCENTE_GRUPO }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run test:e2e:smoke
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-smoke-report
          path: |
            playwright-report
            test-results

  e2e-full:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    needs: e2e-smoke
    env:
      E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
      E2E_DOCENTE_USERNAME: ${{ secrets.E2E_DOCENTE_USERNAME }}
      E2E_DOCENTE_PASSWORD: ${{ secrets.E2E_DOCENTE_PASSWORD }}
      E2E_DOCENTE_ASIGNATURA: ${{ secrets.E2E_DOCENTE_ASIGNATURA }}
      E2E_DOCENTE_GRUPO: ${{ secrets.E2E_DOCENTE_GRUPO }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-full-report
          path: |
            playwright-report
            test-results
